<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Settings</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
display:flex;
background:#f4f7fc;
min-height:100vh;
}

.sidebar{
width:250px;
background:#182951;
color:white;
height:100%;
position:fixed;
padding:20px;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo h2{
color:#60a5fa;
}

.logo p{
font-size:12px;
color:#ccc;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
margin:10px 0;
}

.sidebar ul li a{
display:block;
padding:12px;
color:white;
text-decoration:none;
border-radius:8px;
transition:.3s;
}

.sidebar ul li a:hover,
.sidebar ul li a.active{
background:#2563eb;
}

.main{
margin-left:250px;
width:100%;
padding:40px;
}

.card{

width:700px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);

}

.card h2{

margin-bottom:25px;
color:#182951;

}

label{

font-weight:bold;

}

input{

width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:8px;

}

button{

width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;

}

button:hover{

background:#1d4ed8;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

<h2>CampusSync</h2>

<p>Teacher Panel</p>

</div>

<ul>

<li><a href="/dashboard_teacher">🏠 Dashboard</a></li>

<li><a href="/classes_teacher">🏫 My Classes</a></li>

<li><a href="/attendance_teacher">✅ Attendance</a></li>

<li><a href="/schedule_teacher">📅 Schedule</a></li>

<li><a href="/assignments_teacher">📝 Assignments</a></li>

<li><a href="/messages_teacher">💬 Messages</a></li>

<li><a href="/settings_teacher" class="active">⚙ Settings</a></li>

<li><a href="/logout">🚪 Logout</a></li>

</ul>

</div>

<div class="main">

<div class="card">

<h2>Teacher Profile</h2>

<form action="{{ url_for('update_teacher_profile') }}" method="POST">

<input
type="hidden"
name="id"
value="{{ teacher.id }}">

<label>Name</label>

<input
type="text"
name="name"
value="{{ teacher.name }}"
required>

<label>Email</label>

<input
type="email"
name="email"
value="{{ teacher.email }}"
required>

<label>Department</label>

<input
type="text"
name="department"
value="{{ teacher.department }}"
required>

<label>Designation</label>

<input
type="text"
name="designation"
value="{{ teacher.designation }}"
required>

<button type="submit">

💾 Update Profile

</button>

</form>

</div>

</div>

</body>

</html>
