<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusSync Register</title>

<style>
/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #2563eb
    );
    position:relative;
    transition:.4s;
}

/* ===== FLOATING CIRCLES ===== */
.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    animation:float 8s infinite ease-in-out
}
.c1{
    width:250px;
    height:250px;
    top:-70px;
    left:-70px
}
.c2{
    width:180px;
    height:180px;
    bottom:40px;
    right:60px
    }
.c3{
    width:120px;
    height:120px;
    top:65%;
    left:10%
    }
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-25px)}100%{transform:translateY(0)}}

/* ===== REGISTER CARD ===== */
.register-container{
    width:430px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    text-align:center;
    color:white;
    z-index:10;
    animation:fadeIn 1s ease
}

.logo{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid rgba(255,255,255,.2);
    margin:0 auto 18px;display:block}
h1{
    margin-bottom:8px;
    color:white;
    text-shadow:0 0 10px rgba(0,0,0,.2)
}
.subtitle{
    color:#cfe6ff;
    margin-bottom:18px
}

input,
select{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    margin:8px 0;
    background:rgba(255,255,255,.06);
    color:white;
    font-size:15px;
}
input::placeholder{
    color:rgba(226,232,240,0.7)
}
select option{color:#000}

.register-btn{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(45deg,#2563eb,#3b82f6,#60a5fa);
    transition:.3s
}
.register-btn:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(59,130,246,.3)}

.links{margin-top:14px}
.links a{color:#93c5fd;text-decoration:none}

@keyframes fadeIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:500px){.register-container{width:92%;padding:28px}.logo{width:90px;height:90px}h1{font-size:22px}}

</style>

</head>
<body>

<!-- FLOATING GRAPHICS -->
<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="register-container">
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="CampusSync Logo" class="logo">
    <h1>Create your account</h1>
    <p class="subtitle">Join CampusSync — manage timetables and attendance effortlessly.</p>

    <form method="POST" action="/register">
        <input type="text" name="name" placeholder="Full name" required>
        <input type="email" name="email" placeholder="Email address" required>
        <select name="role" required>
            <option value="" disabled selected>Select role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="admin">Admin</option>
        </select>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="confirm" placeholder="Confirm password" required>
        <button type="submit" class="register-btn">Register</button>
    </form>

    <div class="links">
        <p>Already have an account? <a href="/login">Login</a></p>
    </div>

</div>

<script>
/* Theme Sync */
const theme = localStorage.getItem("theme");
if(theme === "dark"){document.body.classList.add("dark");}
</script>

</body>
</html>
