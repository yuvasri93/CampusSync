<!DOCTYPE html>
<html>

<head>

<title>Student Enrollment Report</title>

<style>

body{
font-family:Segoe UI;
background:#eef2ff;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

.btn{
background:#2563eb;
color:white;
padding:10px 18px;
text-decoration:none;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Student Enrollment Report</h1>

<a href="/reports_admin" class="btn">← Back</a>

<div class="card">

<table>

<tr>

<th>Class</th>

<th>Department</th>

<th>Total Students</th>

</tr>

{% for c in classes %}

<tr>

<td>{{ c.class_name }}</td>

<td>{{ c.department }}</td>

<td>{{ c.strength }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
