<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Attendance - CampusSync</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Lucida Sans',sans-serif;
}

body{
background:#f4f7fc;
display:flex;
min-height:100vh;
}

.sidebar{
width:250px;
background:#182951;
color:white;
position:fixed;
height:100%;
padding:20px;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo h2{
color:#60a5fa;
}

.logo p{
font-size:12px;
color:#9ca3af;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
margin:10px 0;
}

.sidebar ul li a{
display:block;
padding:12px;
color:white;
text-decoration:none;
border-radius:10px;
transition:.3s;
}

.sidebar ul li a:hover,
.sidebar ul li a.active{
background:#2563eb;
}

.main{
margin-left:250px;
width:100%;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.admininfo{
font-weight:bold;
color:#2563eb;
}

.form-box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
max-width:700px;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#334155;
}

.form-group input,
.form-group select{
width:100%;
padding:12px;
border:1px solid #d1d5db;
border-radius:8px;
font-size:15px;
}

.btn{
background:#2563eb;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-right:10px;
}

.btn:hover{
background:#1d4ed8;
}

.cancel{
background:#6b7280;
text-decoration:none;
padding:12px 25px;
color:white;
border-radius:8px;
font-weight:bold;
}

.cancel:hover{
background:#4b5563;
}

@media(max-width:768px){

body{
display:block;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
<h2>CampusSync</h2>
<p>Admin Panel</p>
</div>

<ul>

<li><a href="/dashboard_admin">🏠 Dashboard</a></li>
<li><a href="/students_admin">🎓 Students</a></li>
<li><a href="/teachers_admin">👨‍🏫 Teachers</a></li>
<li><a href="/subjects_admin">📚 Subjects</a></li>
<li><a href="/subject_allocation_admin">🔗 Subject Allocation</a></li>
<li><a href="/classes_admin">🏫 Classes</a></li>
<li><a href="/timetable_admin">📅 Timetable</a></li>
<li><a href="/attendance_admin" class="active">✅ Attendance</a></li>
<li><a href="/reports_admin">📊 Reports</a></li>
<li><a href="/settings_admin">⚙ Settings</a></li>
<li><a href="/logout">🚪 Logout</a></li>

</ul>

</div>

<div class="main">

<div class="topbar">

<div>
<h1>Edit Attendance</h1>
<p>Update Attendance Record</p>
</div>

<div class="admininfo">
{{ admin.name if admin else 'Admin' }}
</div>

</div>

<div class="form-box">

<form method="POST">

<div class="form-group">

<label>Student Name</label>

<input
type="text"
name="student_name"
value="{{ attendance.student_name }}"
required>

</div>

<div class="form-group">

<label>Class</label>

<input
type="text"
name="class_name"
value="{{ attendance.class_name }}"
required>

</div>

<div class="form-group">

<label>Date</label>

<input
type="date"
name="attendance_date"
value="{{ attendance.attendance_date }}"
required>

</div>

<div class="form-group">

<label>Status</label>

<select name="status">

<option value="Present"
{% if attendance.status=="Present" %}selected{% endif %}>
Present
</option>

<option value="Absent"
{% if attendance.status=="Absent" %}selected{% endif %}>
Absent
</option>

<option value="Late"
{% if attendance.status=="Late" %}selected{% endif %}>
Late
</option>

</select>

</div>

<button
type="submit"
class="btn">

Update Attendance

</button>

<a
href="/attendance_admin"
class="cancel">

Cancel

</a>

</form>

</div>

</div>

</body>

</html>
