<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student - CampusSync</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Lucida Sans',sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
}

.sidebar{
    width:250px;
    background:#182951;
    color:white;
    height:100vh;
    position:fixed;
    padding:20px;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h2{
    color:#60a5fa;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin:10px 0;
}

.sidebar ul li a{
    color:white;
    text-decoration:none;
    display:block;
    padding:12px;
    border-radius:10px;
}

.sidebar ul li a:hover,
.sidebar ul li a.active{
    background:#2563eb;
}

.main{
    margin-left:250px;
    width:100%;
    padding:40px;
}

.form-card{
    background:white;
    max-width:700px;
    margin:auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.form-card h1{
    color:#2563eb;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
}

.buttons{
    margin-top:25px;
}

.btn{
    border:none;
    padding:12px 22px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    text-decoration:none;
}

.save{
    background:#2563eb;
    color:white;
}

.cancel{
    background:#6b7280;
    color:white;
    margin-left:10px;
}

.btn:hover{
    opacity:.9;
}
</style>

</head>
<body>

<div class="sidebar">

<div class="logo">
<h2>CampusSync</h2>
<p>Admin Panel</p>
</div>

<ul>
<li><a href="/dashboard_admin">🏠 Dashboard</a></li>
<li><a href="/students_admin" class="active">🎓 Students</a></li>
<li><a href="/teachers_admin">👨‍🏫 Teachers</a></li>
<li><a href="/subjects_admin">📚 Subjects</a></li>
<li><a href="/attendance_admin">✅ Attendance</a></li>
<li><a href="/reports_admin">📊 Reports</a></li>
<li><a href="/settings_admin">⚙ Settings</a></li>
</ul>

</div>

<div class="main">

<div class="form-card">

<h1>Add Student</h1>

<form action="/add_student" method="POST">

<div class="form-group">
<label>Student Name</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Enrollment ID</label>
<input type="text" name="enrollment_id" required>
</div>

<div class="form-group">
<label>Class</label>
<input type="text" name="class_name" required>
</div>

<div class="form-group">
<label>Status</label>

<select name="status">

<option value="Active">Active</option>

<option value="Inactive">Inactive</option>

</select>

</div>

<div class="buttons">

<button class="btn save" type="submit">
Save Student
</button>

<a href="/students_admin" class="btn cancel">
Cancel
</a>

</div>

</form>

</div>

</div>

</body>
</html>
