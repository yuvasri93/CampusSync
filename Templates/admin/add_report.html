<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Report - CampusSync</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fc;
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:250px;
    background:#182951;
    color:white;
    position:fixed;
    height:100%;
    padding:20px;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h2{
    color:#60a5fa;
}

.logo p{
    color:#9ca3af;
    font-size:12px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin:10px 0;
}

.sidebar ul li a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    transition:.3s;
}

.sidebar ul li a:hover,
.sidebar ul li a.active{
    background:#2563eb;
}

.main{
    margin-left:250px;
    width:100%;
    padding:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.admininfo{
    font-weight:bold;
    color:#2563eb;
}

.form-card{
    background:white;
    max-width:700px;
    margin:auto;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.form-card h2{
    color:#2563eb;
    margin-bottom:25px;
    text-align:center;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#334155;
}

.form-group input,
.form-group select{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:15px;
}

.form-group input:focus,
.form-group select:focus{
    outline:none;
    border-color:#2563eb;
}


.btn-group{
    display:flex;
    gap:15px;
    margin-top:25px;
}

.btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
}

.save-btn{
    background:#2563eb;
    color:white;
}

.save-btn:hover{
    background:#1d4ed8;
}

.cancel-btn{
    background:#ef4444;
    color:white;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
}

.cancel-btn:hover{
    background:#dc2626;
}

@media(max-width:768px){

    body{
        display:block;
    }

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        margin-left:0;
    }

}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<h2>CampusSync</h2>
<p>Admin Panel</p>
</div>

<ul>
<li><a href="/dashboard_admin">🏠 Dashboard</a></li>
<li><a href="/students_admin">🎓 Students</a></li>
<li><a href="/teachers_admin">👨‍🏫 Teachers</a></li>
<li><a href="/subjects_admin">📚 Subjects</a></li>
<li><a href="/subject_allocation_admin">🔗 Subject Allocation</a></li>
<li><a href="/classes_admin">🏫 Classes</a></li>
<li><a href="/timetable_admin">📅 Timetable</a></li>
<li><a href="/attendance_admin">✅ Attendance</a></li>
<li><a href="/reports_admin" class="active">📊 Reports</a></li>
<li><a href="/settings_admin">⚙ Settings</a></li>
<li><a href="/logout">🚪 Logout</a></li>
</ul>

</div>

<div class="main">

<div class="topbar">

<div>
<h1>Add Report</h1>
<p>Create a new report entry</p>
</div>

<div class="admininfo">
👤 {{ session.name }}
</div>

</div>

<div class="form-card">

<h2>Generate New Report</h2>

<form action="{{ url_for('add_report') }}" method="POST">

<div class="form-group">
<label>Report Name</label>
<input
type="text"
name="report_name"
placeholder="Enter Report Name"
required>
</div>

<div class="form-group">
<label>Report Type</label>

<select name="report_type" required>

<option value="">Select Report Type</option>

<option>Attendance Report</option>

<option>Performance Report</option>

<option>Student Demographics</option>

<option>Subject Enrollment</option>

<option>Teacher Workload</option>

<option>Academic Calendar</option>

<option>Other</option>

</select>

</div>

<div class="form-group">
<label>Generated Date</label>

<input
type="date"
name="generated_date"
required>

</div>

<div class="form-group">
<label>Generated By</label>

<input
type="text"
name="generated_by"
value="{{ session.name }}"
readonly>

</div>

<div class="btn-group">

<button
type="submit"
class="btn save-btn">
💾 Save Report
</button>

<a
href="{{ url_for('reports_admin') }}"
class="btn cancel-btn">
Cancel
</a>

</div>

</form>

</div>

</div>

</body>
</html>
