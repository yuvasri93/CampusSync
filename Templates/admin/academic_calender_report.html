<!DOCTYPE html>
<html>

<head>

<title>Academic Calendar Report</title>

<style>

body{
font-family:Segoe UI;
background:#eef2ff;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 12px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

.btn{
background:#2563eb;
color:white;
padding:10px 18px;
text-decoration:none;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Academic Calendar Report</h1>

<a href="/reports_admin" class="btn">
← Back
</a>

<div class="card">

<table>

<tr>

<th>Class</th>

<th>Day</th>

<th>Period</th>

<th>Subject</th>

<th>Teacher</th>

<th>Room</th>

</tr>

{% for row in timetable %}

<tr>

<td>{{ row.class_name }}</td>

<td>{{ row.day }}</td>

<td>{{ row.period }}</td>

<td>{{ row.subject }}</td>

<td>{{ row.teacher }}</td>

<td>{{ row.room }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
