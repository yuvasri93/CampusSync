<!DOCTYPE html>
<html>
<head>
    <title>Performance Report</title>

    <style>

body{
    font-family:Arial;
    background:#f5f7fb;
    padding:30px;
}

h1{
    color:#2563eb;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

.back{
    display:inline-block;
    margin-top:20px;
    background:#2563eb;
    color:white;
    padding:10px 18px;
    text-decoration:none;
    border-radius:8px;
}

    </style>

</head>

<body>

<h1>Student Performance Report</h1>

<table>

<tr>

<th>Name</th>

<th>Enrollment ID</th>

<th>Class</th>

<th>Status</th>

</tr>

{% for student in students %}

<tr>

<td>{{ student.name }}</td>

<td>{{ student.enrollment_id }}</td>

<td>{{ student.class_name }}</td>

<td>{{ student.status }}</td>

</tr>

{% endfor %}

</table>

<a href="/reports_admin" class="back">
← Back
</a>

</body>

</html>
