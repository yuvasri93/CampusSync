<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Subject</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Lucida Sans',sans-serif;
}

body{
background:#f4f7fc;
display:flex;
}

.sidebar{
width:250px;
background:#182951;
height:100vh;
position:fixed;
padding:20px;
color:white;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo h2{
color:#60a5fa;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
margin:10px 0;
}

.sidebar ul li a{
display:block;
padding:12px;
color:white;
text-decoration:none;
border-radius:10px;
}

.sidebar ul li a:hover,
.sidebar ul li a.active{
background:#2563eb;
}

.main{
margin-left:250px;
width:100%;
padding:40px;
}

.form-card{
background:white;
max-width:700px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.form-card h1{
color:#2563eb;
margin-bottom:25px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input,
select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
}

.buttons{
margin-top:25px;
}

.btn{
padding:12px 22px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
text-decoration:none;
}

.update{
background:#16a34a;
color:white;
}

.cancel{
background:#6b7280;
color:white;
margin-left:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

<h2>CampusSync</h2>

<p>Admin Panel</p>

</div>

<ul>

<li><a href="/dashboard_admin">🏠 Dashboard</a></li>

<li><a href="/students_admin">🎓 Students</a></li>

<li><a href="/teachers_admin">👨‍🏫 Teachers</a></li>

<li><a href="/subjects_admin" class="active">📚 Subjects</a></li>
<li><a href="/subject_allocation_admin">🔗 Subject Allocation</a></li>
<li><a href="/classes_admin">🏫 Classes</a></li>
<li><a href="/attendance_admin">✅ Attendance</a></li>

<li><a href="/reports_admin">📊 Reports</a></li>

<li><a href="/settings_admin">⚙ Settings</a></li>

</ul>

</div>

<div class="main">

<div class="form-card">

<h1>Edit Subject</h1>

<form action="/edit_subject/{{ subject.id }}" method="POST">

<div class="form-group">

<label>Subject Name</label>

<input
type="text"
name="name"
value="{{subject.name }}"
placeholder="Enter Subject name"
required>

</div>

<div class="form-group">

<label>Subject Code</label>

<input
type="text"
name="code"
value="{{ subject.code }}"
placeholder="Enter Subject Code"
required>

</div>

<div class="form-group">

<label>Instructor </label>

<input
type="text"
name="instructor"
value="{{ subject.instructor }}"
placeholder="Enter Insttructor name"
required>

</div>

<div class="form-group">
<label>Credits</label>
<input
type="text"
name="credits"
value="{{subject.credits}}"
min="1"
required>
</div>

<div class="form-group">
<label>Students Enrolled</label>
<input
type="number"
name="students_enrolled"
value="{{ subject.students_enrolled }}"
min="0"
required>
</div>

<div class="form-group">
<label>Status</label>
<select name="status">
<option value="Active"
{% if subject.status=="Active" %}selected{% endif %}>
Active
</option>
<option value="Inactive"
{% if subject.status=="Inactive" %}selected{% endif %}>
Inactive
</option>
</select>
</div>

<div class="buttons">

<button
class="btn update"
type="submit">

Update Subject

</button>

<a
href="/teachers_admin"
class="btn cancel">

Cancel

</a>

</div>

</form>

</div>

</div>

</body>
</html>
