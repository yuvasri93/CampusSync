<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusSync Login</title>

<style>

/* ===== RESET ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}
/* ===== BODY ===== */
body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #2563eb
    );
    position:relative;
    transition:.4s;
}
/* ===== FLOATING CIRCLES ===== */
.circle{

    position:absolute;

    border-radius:50%;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(20px);

    animation:float 6s infinite ease-in-out;
}

.c1{
    width:250px;
    height:250px;
    top:-70px;
    left:-70px;
}

.c2{
    width:180px;
    height:180px;
    bottom:40px;
    right:60px;
}

.c3{
    width:120px;
    height:120px;
    top:65%;
    left:10%;
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-25px);
    }

    100%{
        transform:translateY(0);
    }
}

/* ===== LOGIN CARD ===== */

.login-container{

    width:430px;

    padding:40px;

    border-radius:25px;

    background:
    rgba(255,255,255,.15);

    backdrop-filter:blur(20px);

    -webkit-backdrop-filter:blur(20px);

    border:
    1px solid rgba(255,255,255,.25);

    box-shadow:
    0 15px 40px rgba(0,0,0,.25);

    text-align:center;

    color:white;

    z-index:10;

    animation:fadeIn 1s ease;
}

/* ===== LOGO ===== */

.logo{

    width:130px;

    height:130px;

    border-radius:50%;

    object-fit:cover;

    border:4px solid white;

    margin-bottom:20px;

    box-shadow:
    0 0 20px rgba(255,255,255,.6),
    0 0 40px rgba(37,99,235,.5);

    animation:pulse 3s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }
}

/* ===== TEXT ===== */

h1{

    margin-bottom:10px;

    color:white;

    text-shadow:
    0 0 10px rgba(255,255,255,.5);
}

.subtitle{

    color:#e2e8f0;

    margin-bottom:25px;
}

/* ===== INPUTS ===== */

input{

    width:100%;

    padding:15px;

    border:none;

    outline:none;

    border-radius:12px;

    margin-bottom:15px;

    background:
    rgba(255,255,255,.2);

    color:white;

    font-size:15px;
}

input::placeholder{

    color:#e2e8f0;
}

/* ===== LOGIN BUTTON ===== */

.login-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    background:
    linear-gradient(
        45deg,
        #2563eb,
        #3b82f6,
        #60a5fa
    );

    transition:.4s;
}

.login-btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 25px rgba(59,130,246,.4);
}

/* ===== LINKS ===== */

.links{

    margin-top:20px;
}

.links a{

    color:#93c5fd;

    text-decoration:none;
}

.links a:hover{

    text-decoration:underline;
}

/* ===== ANIMATION ===== */

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(40px);
    }

    to{

        opacity:1;

        transform:translateY(0);
    }
}

/* ===== DARK THEME FROM WELCOME PAGE ===== */

.dark{

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1e293b
    );
}

/* ===== RESPONSIVE ===== */

@media(max-width:500px){

    .login-container{

        width:90%;
        padding:30px;
    }

    .logo{

        width:100px;
        height:100px;
    }

    h1{

        font-size:28px;
    }
}
.role-selector{

    display:flex;

    gap:10px;

    margin-bottom:20px;
}

.role-btn{

    flex:1;

    padding:14px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-weight:bold;

    transition:.3s;

    background:
    rgba(255,255,255,.15);

    color:white;
}

.role-btn:hover{

    background:
    rgba(255,255,255,.25);
}

.role-btn.active{

    background:
    linear-gradient(
        45deg,
        #2563eb,
        #60a5fa
    );

    box-shadow:
    0 5px 15px rgba(37,99,235,.4);
}

</style>

<script>

function selectRole(role, button){
    document.getElementById("role").value = role;
    let buttons = document.querySelectorAll(".role-btn");
    buttons.forEach(btn => { btn.classList.remove("active"); });
    button.classList.add("active");
}

</script>

</head>

<body>

<!-- FLOATING GRAPHICS -->

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<!-- LOGIN CARD -->

<div class="login-container">

    <!-- Replace logo.png with your logo file -->

    <img src="{{ url_for('static', filename='images/logo.png') }}"
         alt="CampusSync Logo"
         class="logo">

    <h1>CampusSync</h1>

    <p class="subtitle">
        Connecting Learning, Scheduling Success.
    </p>

    <form action="/login" method="POST">
        <div class="role-selector">

    <button type="button"
            class="role-btn active"
            onclick="selectRole('student', this)">
        👨‍🎓 Student
    </button>

    <button type="button"
            class="role-btn"
            onclick="selectRole('teacher', this)">
        👨‍🏫 Teacher
    </button>
    <button type="button" class="role-btn" onclick="selectRole('admin',this)">
        Admin
    </button>

</div>

<input type="hidden"
       id="role"
       name="role"
       value="student">
    

        <input type="email"
               name="email"
               placeholder="Enter Email Address"
               required>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit"
                class="login-btn">
            Login
        </button>

    </form>

    <div class="links">

        <p>
            Don't have an account?
            <a href="/register">Register</a>
        </p>

        <br>

        <a href="#">
            Forgot Password?
        </a>

    </div>

</div>

<script>

/* Theme Sync */

const theme = localStorage.getItem("theme");

if(theme === "dark"){
    document.body.classList.add("dark");
}

</script>

</body>
</html>
